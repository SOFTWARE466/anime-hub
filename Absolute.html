Absolute бағыттары (көрнекі схема)
<html>
<head>
<meta charset="UTF-8">
<title>Absolute бағыттары</title>

<style>
body{
    font-family: Arial;
}

.container{
    width: 500px;
    height: 300px;
    border: 3px dashed gray;
    margin: 50px auto;
    position: relative; /* Абсолют осы контейнерге қатысты */
}

.box{
    width: 110px;
    height: 70px;
    background: #f9cb9c;
    border: 2px solid brown;
    text-align: center;
    line-height: 70px;
    position: absolute;
    font-size: 14px;
}

/* Бағыттар */

.top-left{
    top: 10px;
    left: 10px;
    background: #ffe599;
}

.top-right{
    top: 10px;
    right: 10px;
    background: #9fc5e8;
}

.bottom-left{
    bottom: 10px;
    left: 10px;
    background: #b6d7a8;
}

.bottom-right{
    bottom: 10px;
    right: 10px;
    background: #f4cccc;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Position: Absolute бағыттары</h2>

<div class="container">
    <div class="box top-left">top + left</div>
    <div class="box top-right">top + right</div>
    <div class="box bottom-left">bottom + left</div>
    <div class="box bottom-right">bottom + right</div>
</div>

</body>
</html>
