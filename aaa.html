<!DOCTYPE html>
<html>
<head>
    <title>Кесте үлгісі</title>
    <style>
        table {width: 600px;
            border-collapse: collapse;
            margin: 20px auto;}
        td {border: 1px solid black;
            text-align: center;
            padding: 20px;}
    </style>
</head>
<body>

    <table>
        <tr>
            <td colspan="2" rowspan="2"></td>
            <td colspan="3"></td>
        </tr>
        <tr>
            <td rowspan="2"></td>
            <td colspan="2"></td>
        </tr>
        <tr>
            <td colspan="2"></td>
            <td></td>
        </tr>
        <tr>
            <td colspan="3"></td>
            <td colspan="2"></td>
        </tr>
    </table>

</body>
</html>
