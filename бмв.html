<!DOCTYPE html>
<html>
<head>
    <title>BMW Әлемі</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #000;
            color: white;
            padding: 20px;
            font-size: 24px;
        }
        .container {
            padding: 20px;
        }
        img {
            width: 80%;
            max-width: 600px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <header>🚗 BMW Әлемі 🚗</header>

    <div class="container">
        <h1>BMW - Жылдамдық пен Стиль</h1>
        <p>BMW – әлемдегі ең танымал автокөлік брендтерінің бірі. Ол жоғары өнімділігімен, инновациялық технологияларымен және стильді дизайнымен ерекшеленеді.</p>

        <img src="https://www.bmw.com/content/dam/bmw/marketBMWCOM/bmw_com/categories/home/bmw-8-series-coupe-06.jpg" alt="BMW Car">
        
        <p>Сізге BMW ұнай ма? Егер иә болса, төмендегі батырманы басыңыз!</p>
        
        <button onclick="showMessage()">Мен BMW жақсы көремін! ❤️</button>
    </div>

    <script>
        function showMessage() {
            alert("Керемет таңдау! BMW - ең үздік автомобиль брендтерінің бірі!");
        }
    </script>

</body>
</html>
